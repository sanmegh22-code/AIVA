services:
  postgres:
    image: postgres:16
    container_name: aiva-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aiva

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n
    container_name: aiva-n8n
    restart: unless-stopped

    ports:
      - "5678:5678"

    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http

    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data: